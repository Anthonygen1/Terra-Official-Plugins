{{- if eq .Values.network_mode "nodeport" }}
apiVersion: v1
kind: Service
metadata:
  name: "{{ .Release.Name }}-nodeport"
  labels:
    kuiper.juno-innovations.com/kuiper-instance: "{{ .Release.Name }}"
spec:
  type: NodePort
  selector:
    kuiper.juno-innovations.com/kuiper-instance: "{{ .Release.Name }}"
  ports:
    - port: {{ .Values.app_port }}
      targetPort: {{ .Values.app_port }}
      protocol: TCP
      name: http
{{- end }}
