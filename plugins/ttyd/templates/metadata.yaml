apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-terra-metadata
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
  annotations:
    juno-innovations.com/workload: "Terminal"
data:
  chart: "{{ .Release.Name }}-scripts-configmap"
  description: "TTYD web-based terminal emulator"
  fields: |
    - name: registry
      description: "Registry to pull the ttyd image from"
      type: string
      required: true
      default: "tsl0922"
    - name: repo
      description: "Repository to pull the ttyd image from"
      type: string
      required: true
      default: "ttyd"
    - name: tag
      description: "Tag to pull the ttyd image from"
      type: string
      required: true
      default: "latest"
    - name: shell_command
      description: "Shell command for ttyd to run (e.g. bash, sh, zsh)"
      type: string
      required: true
      default: "bash"
    - name: nginx_registry
      description: "Registry to pull the nginx sidecar image from"
      type: string
      required: true
      default: "docker.io"
    - name: nginx_repo
      description: "Repository to pull the nginx sidecar image from"
      type: string
      required: true
      default: "nginx"
    - name: nginx_tag
      description: "Tag to pull the nginx sidecar image from"
      type: string
      required: true
      default: "alpine"
    - name: ttyd_port
      description: "Port that ttyd listens on inside the container"
      type: string
      required: true
      default: "7681"
    - name: font_size
      description: "Terminal font size in pixels"
      type: integer
      required: true
      default: 16
    - name: writable
      description: "Allow input to the terminal (set to false for read-only view)"
      type: boolean
      required: true
      default: true
    - name: terra_role
      description: Name of a Terra role to assign to the TTYD workload. This refers to plugin-level installed roles.
      required: false
      type: k8sServiceAccount
    - name: publicAccess
      description: "Allow public access (disable authentication)"
      type: boolean
      required: true
      default: false
