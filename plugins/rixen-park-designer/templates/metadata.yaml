apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-terra-metadata"
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
  annotations:
    juno-innovations.com/workload: "Application"
data:
  chart: "{{ .Release.Name }}-scripts-configmap"
  description: "3D obstacle layout designer for the Ski Rixen cable park. Drag the ramp and rail on a WebGL model of the real lake; layouts save to /data/layout.json."
  fields: |
    - name: registry
      description: "Registry to pull the app image from"
      required: true
      default: "ghcr.io"
    - name: repo
      description: "Repository to pull the app image from"
      required: true
      default: "anthonygen1/rixen-park-builder"
    - name: tag
      description: "Tag to pull the app image from"
      required: true
      default: "latest"
    - name: pull_secret
      description: "Name of an existing docker-registry Secret in the project namespace for pulling the app image (e.g. ghcr-pull). Leave empty for public images."
      type: string
      required: false
      default: ""
    - name: ingressNamespace
      description: "Ingress controller namespace. Default: ingress-nginx"
      required: false
      default: "ingress-nginx"
    - name: cpu
      description: "CPU request"
      required: true
      default: "250m"
    - name: memory
      description: "Memory request"
      required: true
      default: "128Mi"
    - name: storageClass
      description: "Storage class for the layout PVC"
      required: true
      type: k8sStorageClass
    - name: storageSize
      description: "Layout PVC size. Layouts are tiny JSON files — 2Gi is plenty."
      required: false
      default: "2Gi"
    - name: publicAccess
      description: "Allow public access (disable authentication)"
      type: boolean
      required: true
      default: false
