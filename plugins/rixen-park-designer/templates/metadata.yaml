apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-terra-metadata"
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
  annotations:
    juno-innovations.com/workload: "Application"
data:
  chart: "{{ .Release.Name }}-scripts-configmap"
  description: "3D obstacle layout designer for the Ski Rixen cable park. Drag the ramp and rail on a WebGL model of the real lake; layouts save to /data/layout.json."
  fields: |
    - name: registry
      description: "Container registry"
      required: true
      default: "docker.io"
    - name: repo
      description: "Container image repository (any stock Python 3 image works)"
      required: true
      default: "python"
    - name: tag
      description: "Container image tag"
      required: true
      default: "3.12-alpine"
    - name: ingressNamespace
      description: "Ingress controller namespace. Default: ingress-nginx"
      required: false
      default: "ingress-nginx"
    - name: cpu
      description: "CPU request"
      required: true
      default: "250m"
    - name: memory
      description: "Memory request"
      required: true
      default: "128Mi"
    - name: storageClass
      description: "Storage class for the layout PVC"
      required: true
      type: k8sStorageClass
    - name: storageSize
      description: "Layout PVC size. Layouts are tiny JSON files — 2Gi is plenty."
      required: false
      default: "2Gi"
    - name: publicAccess
      description: "Allow public access (disable authentication)"
      type: boolean
      required: true
      default: false
