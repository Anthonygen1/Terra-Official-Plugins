# Kuiper-injected standard values — do not remove
name: rixen-park-designer
user:
group:
cpu: "250m"
memory: "128Mi"
cpuLimit: null
memoryLimit: null
idx: 0
guid: 0
puid: 0
host:
pullSecret:
session:
volumeMounts: []
volumes: []
env:
  - name: JUNO
    value: "true"
selector:
plugins: []
_kuiper:

# Rixen Park Designer settings (app baked into the image, built from
# the rixen-park-builder repo by GitHub Actions)
registry: "ghcr.io"
repo: "anthonygen1/rixen-park-builder"
tag: "latest"
ingressNamespace: "ingress-nginx"

# Image pull secret name (docker-registry Secret in project namespace); empty = public image
pull_secret: ""
storageClass: ""
storageSize: "2Gi"
publicAccess: false
